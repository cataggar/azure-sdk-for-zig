name: Zig SDK

on:
  push:
    branches: [zig]
    paths:
      - 'src/**'
      - 'build.zig'
      - 'build.zig.zon'
      - '.github/workflows/zig.yml'
  pull_request:
    branches: [zig]
    paths:
      - 'src/**'
      - 'build.zig'
      - 'build.zig.zon'
      - '.github/workflows/zig.yml'

jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build
        run: zig build

      - name: Test
        run: zig build test --summary all
