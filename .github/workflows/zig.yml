name: Zig SDK

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: zig-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Format check
        run: zig fmt --check sdk/core/ codegen/ eng/ build.zig

      - name: Build workspace
        run: zig build

      - name: Test main-owned package suite
        run: zig build test --summary all

      - name: Validate package registry
        if: matrix.os == 'ubuntu-latest'
        run: zig build package-check --summary all

      - name: Validate package history mappings
        if: matrix.os == 'ubuntu-latest'
        run: zig build package-history-check --summary all

      - name: Test TypeSpec emitter
        if: matrix.os == 'ubuntu-latest'
        working-directory: codegen/cli
        run: zig build test --summary all

      - name: Validate documentation links
        if: matrix.os == 'ubuntu-latest'
        run: zig build docs-check --summary all

      - name: Test generic release engine
        if: matrix.os == 'ubuntu-latest'
        run: zig build release-self-test --summary all
